{% extends "base.html" %}

{% block title %}Confirmer la suppression{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirmer la suppression</h5>
            </div>
            <div class="card-body">
                <p class="mb-3">Êtes-vous sûr de vouloir supprimer cette catégorie ?</p>
                <p class="alert alert-info mb-3">
                    <strong>{{ categorie.nom }}</strong>
                </p>
                <p class="text-muted small">⚠️ Cette action est irréversible.</p>
            </div>
            <div class="card-footer bg-light">
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Supprimer
                    </button>
                </form>
                <a href="{% url 'liste_categories' %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Annuler
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
